# Encryption Configuration

encryption:
  enabled: true
  algorithm: "AES-256-GCM"
  
  at_rest:
    enabled: true
    key_management: "vault"  # vault, kms, local
    key_rotation_enabled: true
    rotation_period_days: 90
    
  in_transit:
    enabled: true
    tls_version: "1.3"
    cipher_suites:
      - "TLS_AES_256_GCM_SHA384"
      - "TLS_CHACHA20_POLY1305_SHA256"
  
  field_level:
    enabled: true
    encrypted_fields:
      - password
      - api_key
      - secret_key
      - credit_card
      - ssn

key_management:
  provider: "local"  # local, aws_kms, azure_keyvault, gcp_kms
  
  local:
    key_file: ".keys/encryption.key"
    backup_enabled: true
    backup_location: ".keys/backup/"
  
  rotation:
    automatic: true
    period_days: 90
    retain_old_keys: true
    retention_count: 3

pii_encryption:
  automatic: true
  encryption_level: "field"  # field, document, database
  pii_types_to_encrypt:
    - ssn
    - credit_card
    - password
    - api_key